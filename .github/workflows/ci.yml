name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

jobs:
  # ─── Build & Test ──────────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Test
        run: dotnet test src/Plumix.Tests/Plumix.Tests.csproj -c Release --logger "console;verbosity=normal"

  # ─── Pack & Publish (tags only) ────────────────────────────────────────────
  publish:
    name: Pack & Publish to NuGet
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Extract version from tag
        run: echo "PKG_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Pack
        run: |
          dotnet pack src/Plumix/Plumix.csproj               -c Release -p:Version=$PKG_VERSION
          dotnet pack src/Plumix.Material/Plumix.Material.csproj   -c Release -p:Version=$PKG_VERSION
          dotnet pack src/Plumix.Cupertino/Plumix.Cupertino.csproj -c Release -p:Version=$PKG_VERSION

      - name: Push to NuGet.org
        run: |
          for pkg in \
            src/Plumix/bin/Release/Plumix.${PKG_VERSION}.nupkg \
            src/Plumix.Material/bin/Release/Plumix.Material.${PKG_VERSION}.nupkg \
            src/Plumix.Cupertino/bin/Release/Plumix.Cupertino.${PKG_VERSION}.nupkg; do
            dotnet nuget push "$pkg" \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done
